<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensive Portfolio Test Suite</title>
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
            background: #0a0f1c;
            color: #e2e8f0;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .test-container {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 2rem;
            backdrop-filter: blur(12px);
            margin-bottom: 2rem;
        }
        .test-header {
            color: #06b6d4;
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .test-section {
            margin-bottom: 2rem;
        }
        .test-button {
            background: linear-gradient(135deg, #2563eb, #06b6d4);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 1rem;
            margin-bottom: 1rem;
        }
        .test-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(6, 182, 212, 0.3);
        }
        .test-button.performance {
            background: linear-gradient(135deg, #10b981, #06b6d4);
        }
        .test-button.accessibility {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
        }
        .test-results {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.85rem;
            line-height: 1.4;
        }
        .status {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            font-weight: bold;
        }
        .status.pass {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .status.fail {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .status.warning {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        .loading {
            color: #f59e0b;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .metric-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }
        .metric-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #06b6d4;
            margin-bottom: 0.5rem;
        }
        .metric-label {
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tab {
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .tab.active {
            color: #06b6d4;
            border-bottom-color: #06b6d4;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="test-header">
            <span>🧪</span>
            <span>Comprehensive Portfolio Test Suite</span>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('functionality')">Functionality Tests</button>
            <button class="tab" onclick="switchTab('performance')">Performance Tests</button>
            <button class="tab" onclick="switchTab('accessibility')">Accessibility Tests</button>
            <button class="tab" onclick="switchTab('all')">All Tests</button>
        </div>
        
        <!-- Functionality Tests Tab -->
        <div id="functionality-tab" class="tab-content active">
            <div class="test-section">
                <button class="test-button" onclick="runFunctionalityTests()">
                    Run Functionality Tests
                </button>
                <div id="functionality-output" class="test-results"></div>
                <div id="functionality-status" class="status"></div>
            </div>
        </div>
        
        <!-- Performance Tests Tab -->
        <div id="performance-tab" class="tab-content">
            <div class="test-section">
                <button class="test-button performance" onclick="runPerformanceTests()">
                    Run Performance Tests
                </button>
                <div id="performance-output" class="test-results"></div>
                <div id="performance-status" class="status"></div>
                <div id="performance-metrics" class="metrics-grid"></div>
            </div>
        </div>
        
        <!-- Accessibility Tests Tab -->
        <div id="accessibility-tab" class="tab-content">
            <div class="test-section">
                <button class="test-button accessibility" onclick="runAccessibilityTests()">
                    Run Accessibility Tests
                </button>
                <div id="accessibility-output" class="test-results"></div>
                <div id="accessibility-status" class="status"></div>
            </div>
        </div>
        
        <!-- All Tests Tab -->
        <div id="all-tab" class="tab-content">
            <div class="test-section">
                <button class="test-button" onclick="runAllTests()">
                    Run All Tests
                </button>
                <div id="all-output" class="test-results"></div>
                <div id="all-status" class="status"></div>
            </div>
        </div>
    </div>

    <script src="test.js"></script>
    <script src="performance-test.js"></script>
    <script>
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(`${tabName}-tab`).classList.add('active');
            event.target.classList.add('active');
        }
        
        async function runFunctionalityTests() {
            await runTestSuite('functionality', portfolioTests);
        }
        
        async function runPerformanceTests() {
            await runPerformanceTestSuite();
        }
        
        async function runAccessibilityTests() {
            await runAccessibilityTestSuite();
        }
        
        async function runAllTests() {
            const output = document.getElementById('all-output');
            const status = document.getElementById('all-status');
            
            output.innerHTML = '<div class="loading">🔄 Running comprehensive test suite...</div>';
            status.className = 'status loading';
            status.textContent = 'Tests in progress...';
            
            try {
                const logs = [];
                
                // Capture console output
                const originalLog = console.log;
                console.log = function(...args) {
                    logs.push(args.join(' '));
                    originalLog.apply(console, args);
                };
                
                // Run functionality tests
                logs.push('\n🧪 FUNCTIONALITY TESTS');
                logs.push('='.repeat(50));
                await portfolioTests.run();
                
                // Run performance tests
                logs.push('\n📊 PERFORMANCE TESTS');
                logs.push('='.repeat(50));
                await performanceTester.runAllTests();
                
                // Display results
                output.textContent = logs.join('\n');
                
                const totalPassed = portfolioTests.passed;
                const totalFailed = portfolioTests.failed;
                
                if (totalFailed === 0) {
                    status.className = 'status pass';
                    status.textContent = `🎉 All ${totalPassed} functionality tests passed! Performance tests completed.`;
                } else {
                    status.className = 'status warning';
                    status.textContent = `⚠️ ${totalPassed} passed, ${totalFailed} failed. Check performance metrics.`;
                }
                
            } catch (error) {
                output.textContent = `Error running tests: ${error.message}`;
                status.className = 'status fail';
                status.textContent = '❌ Test execution failed';
            } finally {
                // Restore original console.log
                console.log = originalLog;
            }
        }
        
        async function runTestSuite(suiteName, testRunner) {
            const output = document.getElementById(`${suiteName}-output`);
            const status = document.getElementById(`${suiteName}-status`);
            
            output.innerHTML = '<div class="loading">🔄 Running tests...</div>';
            status.className = 'status loading';
            status.textContent = 'Tests in progress...';
            
            try {
                // Capture console output
                const originalLog = console.log;
                let logs = [];
                
                console.log = function(...args) {
                    logs.push(args.join(' '));
                    originalLog.apply(console, args);
                };
                
                await testRunner.run();
                
                // Display results
                output.textContent = logs.join('\n');
                
                if (testRunner.failed === 0) {
                    status.className = 'status pass';
                    status.textContent = `🎉 All ${testRunner.passed} tests passed!`;
                } else {
                    status.className = 'status fail';
                    status.textContent = `⚠️ ${testRunner.passed} passed, ${testRunner.failed} failed`;
                }
                
            } catch (error) {
                output.textContent = `Error running tests: ${error.message}`;
                status.className = 'status fail';
                status.textContent = '❌ Test execution failed';
            } finally {
                // Restore original console.log
                console.log = originalLog;
            }
        }
        
        async function runPerformanceTestSuite() {
            const output = document.getElementById('performance-output');
            const status = document.getElementById('performance-status');
            const metrics = document.getElementById('performance-metrics');
            
            output.innerHTML = '<div class="loading">🔄 Running performance tests...</div>';
            status.className = 'status loading';
            status.textContent = 'Performance tests in progress...';
            
            try {
                const logs = [];
                const originalLog = console.log;
                
                console.log = function(...args) {
                    logs.push(args.join(' '));
                    originalLog.apply(console, args);
                };
                
                const results = await performanceTester.runAllTests();
                
                output.textContent = logs.join('\n');
                
                // Display metrics cards
                if (results.pageLoad) {
                    metrics.innerHTML = `
                        <div class="metric-card">
                            <div class="metric-value">${(results.pageLoad.totalLoadTime / 1000).toFixed(2)}s</div>
                            <div class="metric-label">Load Time</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value">${(results.pageLoad.firstContentfulPaint / 1000).toFixed(2)}s</div>
                            <div class="metric-label">First Paint</div>
                        </div>
                    `;
                }
                
                if (results.animation) {
                    const fps = 1000 / results.animation.averageFrameTime;
                    metrics.innerHTML += `
                        <div class="metric-card">
                            <div class="metric-value">${fps.toFixed(1)}</div>
                            <div class="metric-label">FPS</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value">${results.animation.frameDrops}</div>
                            <div class="metric-label">Frame Drops</div>
                        </div>
                    `;
                }
                
                status.className = 'status pass';
                status.textContent = '✅ Performance tests completed successfully';
                
            } catch (error) {
                output.textContent = `Error running performance tests: ${error.message}`;
                status.className = 'status fail';
                status.textContent = '❌ Performance test execution failed';
            } finally {
                console.log = originalLog;
            }
        }
        
        async function runAccessibilityTestSuite() {
            const output = document.getElementById('accessibility-output');
            const status = document.getElementById('accessibility-status');
            
            output.innerHTML = '<div class="loading">🔄 Running accessibility tests...</div>';
            status.className = 'status loading';
            status.textContent = 'Accessibility tests in progress...';
            
            try {
                const logs = [];
                const originalLog = console.log;
                
                console.log = function(...args) {
                    logs.push(args.join(' '));
                    originalLog.apply(console, args);
                };
                
                const results = performanceTester.testAccessibility();
                
                output.textContent = logs.join('\n');
                
                if (results.score >= 80) {
                    status.className = 'status pass';
                    status.textContent = `♿ Excellent accessibility score: ${results.score.toFixed(1)}%`;
                } else if (results.score >= 60) {
                    status.className = 'status warning';
                    status.textContent = `♿ Good accessibility score: ${results.score.toFixed(1)}% - Room for improvement`;
                } else {
                    status.className = 'status fail';
                    status.textContent = `♿ Accessibility needs improvement: ${results.score.toFixed(1)}%`;
                }
                
            } catch (error) {
                output.textContent = `Error running accessibility tests: ${error.message}`;
                status.className = 'status fail';
                status.textContent = '❌ Accessibility test execution failed';
            } finally {
                console.log = originalLog;
            }
        }
    </script>
</body>
</html>
