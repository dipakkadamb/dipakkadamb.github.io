<!DOCTYPE html>
<html lang="en" class="scroll-smooth antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Gallery | Dipak Kadamb</title>
    <meta name="description" content="Project updates by Dipak Kadamb.">
    <link rel="icon" href="assets/img/profile.png" type="image/png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { accent: { blue: '#2563eb', cyan: '#06b6d4', teal: '#0d9488', pink: '#db2777' }, cream: '#f5f0e6' },
                    fontFamily: { 
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        playfair: ['"Playfair Display"', 'serif']
                    }
                }
            }
        }
    </script>
    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f3ede2; color: #1a1a1a; }
        .ig-gradient { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        
        /* Masonry Layout Styles */
        .masonry-layout {
            column-count: 1;
            column-gap: 2.5rem;
        }
        @media (min-width: 640px) {
            .masonry-layout {
                column-count: 2;
            }
        }
        @media (min-width: 1024px) {
            .masonry-layout {
                column-count: 3;
            }
        }
        .gallery-item {
            break-inside: avoid;
            margin-bottom: 3.5rem;
            cursor: pointer;
        }
        
        /* Lightbox Styles */
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            align-items: center;
            justify-content: center;
        }
        .lightbox.active {
            display: flex;
            opacity: 1;
        }
        .lightbox-content {
            background: white;
            width: 100%;
            max-width: 900px;
            height: 90vh;
            max-height: 600px;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        @media (min-width: 768px) {
            .lightbox-content {
                flex-direction: row;
            }
        }
        .lightbox-img-container {
            flex: 1;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lightbox-img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .lightbox-sidebar {
            width: 100%;
            background: white;
            display: flex;
            flex-direction: column;
        }
        @media (min-width: 768px) {
            .lightbox-sidebar {
                width: 350px;
                border-left: 1px solid #e5e7eb;
            }
        }
        .lightbox-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            color: white;
            cursor: pointer;
            z-index: 101;
        }
        .upload-section {
            background: white; border: 1px solid #e5e7eb; padding: 2rem; margin-bottom: 4rem; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="pb-20">

<!-- Nav -->
<nav class="fixed top-0 w-full bg-[#f3ede2]/90 backdrop-blur-md z-50 h-16 flex items-center px-6 border-b border-black/5">
    <div class="max-w-6xl w-full mx-auto flex items-center justify-between">
        <a href="index.html" class="text-slate-900 hover:text-slate-500 transition"><i data-feather="arrow-left" class="w-6 h-6"></i></a>
        <span class="font-playfair font-bold text-xl tracking-wide uppercase">Gallery</span>
        <div class="w-6"></div>
    </div>
</nav>

<!-- Main Feed -->
<main class="pt-28 px-4 sm:px-6 max-w-6xl mx-auto pb-20">
    
    <!-- Upload Section -->
    <div class="upload-section max-w-2xl mx-auto relative overflow-hidden">
        <div class="absolute top-0 left-0 w-1 h-full bg-slate-900"></div>
        <h2 class="font-playfair text-2xl font-bold uppercase tracking-wider mb-5">Add to Editorial</h2>
        
        <input type="text" id="new-post-title" class="w-full bg-slate-50 border-b border-slate-300 p-3 text-lg font-playfair outline-none focus:border-slate-900 transition mb-4 placeholder-slate-400" placeholder="Event or Location Name...">
        
        <textarea id="new-post-content" rows="2" class="w-full bg-slate-50 border border-slate-200 p-3 text-sm outline-none focus:border-slate-900 transition resize-none placeholder-slate-400" placeholder="Write a description..."></textarea>
        
        <div id="image-preview-container" class="hidden mt-4 relative w-full border border-slate-200 overflow-hidden bg-slate-100 flex items-center justify-center">
            <img id="image-preview" class="w-full h-auto object-contain max-h-64">
            <button onclick="removeImage()" class="absolute top-2 right-2 p-1.5 bg-slate-900/50 rounded-full text-white hover:bg-slate-900/70 transition"><i data-feather="x" class="w-4 h-4"></i></button>
        </div>
        
        <div class="flex justify-between items-center mt-6">
            <label for="new-post-image" class="cursor-pointer text-slate-600 border border-slate-300 hover:bg-slate-100 transition-colors flex items-center gap-2 px-5 py-2.5 font-medium text-sm tracking-wide">
                <i data-feather="camera" class="w-4 h-4"></i> Select Photo
            </label>
            <input type="file" id="new-post-image" accept="image/*" class="hidden" onchange="previewImage(event)">
            <button onclick="createNewPost()" class="bg-slate-900 text-white px-8 py-2.5 text-sm font-bold uppercase tracking-wider hover:bg-slate-800 transition shadow-md">Publish</button>
        </div>
    </div>

    <!-- Gallery Masonry -->
    <div id="gallery-masonry" class="masonry-layout"></div>

</main>

<!-- Lightbox Modal -->
<div id="lightbox" class="lightbox" onclick="if(event.target === this) closeLightbox()">
    <div class="lightbox-close" onclick="closeLightbox()"><i data-feather="x" class="w-8 h-8"></i></div>
    <div class="lightbox-content m-4" onclick="event.stopPropagation()">
        <!-- Left: Image -->
        <div class="lightbox-img-container">
            <img id="lb-image" src="" alt="Gallery Image">
            <div id="lb-text-placeholder" class="hidden px-8 py-12 text-center text-white text-xl font-medium w-full h-full flex items-center justify-center bg-slate-800"></div>
        </div>
        <!-- Right: Info -->
        <div class="lightbox-sidebar flex flex-col h-full bg-[#fcfaf7]">
            <!-- Header -->
            <div class="flex items-center p-5 border-b border-black/5 shrink-0">
                <div class="w-8 h-8 rounded-full overflow-hidden mr-3 border border-slate-200">
                    <img src="assets/img/profile.png" class="w-full h-full object-cover">
                </div>
                <div class="font-semibold text-sm uppercase tracking-wider">dipakkadamb</div>
            </div>
            <!-- Scrollable Content -->
            <div class="p-6 flex-1 overflow-y-auto" style="scrollbar-width: thin;">
                <!-- Caption -->
                <div class="mb-6">
                    <h3 id="lb-title" class="font-playfair font-bold text-xl uppercase tracking-widest mb-3"></h3>
                    <div id="lb-caption" class="text-sm text-slate-600 leading-relaxed font-medium uppercase tracking-wide"></div>
                    <div id="lb-date" class="text-[10px] text-slate-400 uppercase tracking-widest mt-4"></div>
                </div>
            </div>
            <!-- Actions -->
            <div class="p-4 border-t border-black/5 shrink-0 bg-white">
                <div class="flex items-center gap-4">
                    <button onclick="shareLink()" class="flex items-center gap-2 text-slate-600 hover:text-slate-900 transition uppercase text-xs font-bold tracking-widest"><i data-feather="share-2" class="w-4 h-4"></i> Share</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    feather.replace();

    const POSTS_KEY = 'timeline_user_posts';

    // Default post
    const defaultPost = {
        id: 'default-post',
        title: 'STAY WITH LUXURY AT SEA PEARL',
        text: 'Functionality & individuality are the essence of our executive suites.',
        image: null,
        date: new Date().toISOString()
    };

    let customPosts = JSON.parse(localStorage.getItem(POSTS_KEY)) || [];
    let currentLightboxPostId = null;

    document.addEventListener("DOMContentLoaded", () => {
        renderGallery();
    });

    let selectedImageBase64 = null;

    function previewImage(event) {
        const file = event.target.files[0];
        if(!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            selectedImageBase64 = e.target.result;
            const container = document.getElementById('image-preview-container');
            const preview = document.getElementById('image-preview');
            preview.src = selectedImageBase64;
            container.classList.remove('hidden');
            if(window.feather) feather.replace();
        };
        reader.readAsDataURL(file);
    }

    function removeImage() {
        selectedImageBase64 = null;
        document.getElementById('new-post-image').value = '';
        const container = document.getElementById('image-preview-container');
        const preview = document.getElementById('image-preview');
        preview.src = '';
        container.classList.add('hidden');
    }

    function createNewPost() {
        const titleInput = document.getElementById('new-post-title');
        const contentInput = document.getElementById('new-post-content');
        
        const title = titleInput.value.trim() || 'UNTITLED EVENT';
        const text = contentInput.value.trim();
        
        if (!selectedImageBase64) {
            alert('Please select an image for the editorial gallery.');
            return;
        }

        const newPost = {
            id: 'post-' + Date.now(),
            title: title,
            text: text,
            image: selectedImageBase64,
            date: new Date().toISOString()
        };

        customPosts.unshift(newPost);
        localStorage.setItem(POSTS_KEY, JSON.stringify(customPosts));
        
        titleInput.value = '';
        contentInput.value = '';
        removeImage();
        renderGallery();
    }

    function getAllPosts() {
        return [...customPosts, defaultPost];
    }

    function renderGallery() {
        const masonry = document.getElementById('gallery-masonry');
        if (!masonry) return;
        
        masonry.innerHTML = '';
        const allPosts = getAllPosts();
        
        allPosts.forEach(post => {
            const div = document.createElement('div');
            div.className = 'gallery-item group';
            div.onclick = () => openLightbox(post.id);
            
            const titleDisplay = post.title || 'UNTITLED EVENT';
            const textDisplay = post.text ? `<p class="text-[10px] sm:text-xs text-slate-500 uppercase tracking-widest mt-2 leading-relaxed">${post.text}</p>` : '';
            
            if (post.image) {
                div.innerHTML = `
                    <div class="overflow-hidden bg-slate-200">
                        <img src="${post.image}" alt="${titleDisplay}" class="w-full h-auto object-cover transition-transform duration-700 ease-out group-hover:scale-105" loading="lazy">
                    </div>
                    <div class="mt-4 px-1">
                        <h3 class="font-playfair font-bold text-lg sm:text-xl uppercase tracking-wider flex items-center justify-between text-slate-900 group-hover:text-slate-600 transition-colors">
                            <span>${titleDisplay}</span> 
                            <i data-feather="arrow-up-right" class="w-5 h-5 shrink-0 ml-3"></i>
                        </h3>
                        ${textDisplay}
                    </div>
                `;
            } else {
                div.innerHTML = `
                    <div class="w-full aspect-[4/3] bg-slate-800 flex items-center justify-center p-8 text-center overflow-hidden relative">
                        <div class="absolute inset-0 bg-slate-900/50 mix-blend-multiply"></div>
                        <i data-feather="terminal" class="w-12 h-12 text-slate-400 relative z-10"></i>
                    </div>
                    <div class="mt-4 px-1">
                        <h3 class="font-playfair font-bold text-lg sm:text-xl uppercase tracking-wider flex items-center justify-between text-slate-900 group-hover:text-slate-600 transition-colors">
                            <span>${titleDisplay}</span> 
                            <i data-feather="arrow-up-right" class="w-5 h-5 shrink-0 ml-3"></i>
                        </h3>
                        ${textDisplay}
                    </div>
                `;
            }
            masonry.appendChild(div);
        });
        
        if(window.feather) feather.replace();
    }

    function openLightbox(postId) {
        currentLightboxPostId = postId;
        const post = getAllPosts().find(p => p.id === postId);
        if(!post) return;
        
        const lbImg = document.getElementById('lb-image');
        const lbTextPlaceholder = document.getElementById('lb-text-placeholder');
        
        if(post.image) {
            lbImg.src = post.image;
            lbImg.classList.remove('hidden');
            lbTextPlaceholder.classList.add('hidden');
        } else {
            lbImg.classList.add('hidden');
            lbTextPlaceholder.innerHTML = `<i data-feather="terminal" class="w-16 h-16 text-slate-500"></i>`;
            lbTextPlaceholder.classList.remove('hidden');
            if(window.feather) feather.replace();
        }
        
        document.getElementById('lb-title').textContent = post.title || 'UNTITLED EVENT';
        document.getElementById('lb-caption').innerHTML = post.text ? post.text.replace(/\\n/g, '<br>') : '';
        document.getElementById('lb-date').textContent = new Date(post.date).toLocaleDateString() + ' ' + new Date(post.date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        document.getElementById('lightbox').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('active');
        document.body.style.overflow = '';
        currentLightboxPostId = null;
    }

    function shareLink() {
        if (navigator.share) {
            navigator.share({ title: 'Dipak Kadamb Portfolio', url: window.location.href });
        } else {
            alert('Share functionality unavailable');
        }
    }
</script>
</body>
</html>
