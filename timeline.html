<!DOCTYPE html>
<html lang="en" class="scroll-smooth antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Wedding Gallery | Dipak Kadamb</title>
    <meta name="description" content="Wedding gallery and memories.">
    <link rel="icon" href="assets/img/profile.png" type="image/png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">

    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        wedding: {
                            ivory: '#fdfbf9',
                            champagne: '#f4ede4',
                            gold: '#c5a880',
                            charcoal: '#2c3539',
                            blush: '#f8e5e5'
                        }
                    },
                    fontFamily: { 
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        playfair: ['"Playfair Display"', 'serif'],
                        script: ['"Great Vibes"', 'cursive']
                    }
                }
            }
        }
    </script>
    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfbf9; color: #2c3539; }
        
        .masonry-layout {
            column-count: 1;
            column-gap: 3rem;
        }
        @media (min-width: 640px) { .masonry-layout { column-count: 2; } }
        @media (min-width: 1024px) { .masonry-layout { column-count: 3; } }
        
        .gallery-item {
            break-inside: avoid;
            margin-bottom: 4rem;
            cursor: pointer;
            position: relative;
        }

        .img-container {
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
            border-radius: 4px;
        }
        .img-container img {
            width: 100%;
            height: auto;
            object-fit: cover;
            transition: transform 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .gallery-item:hover .img-container img {
            transform: scale(1.08);
        }
        .img-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(44,53,57,0.3) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 1s ease;
        }
        .gallery-item:hover .img-overlay {
            opacity: 1;
        }

        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(253, 251, 249, 0.98);
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            align-items: center;
            justify-content: center;
        }
        .lightbox.active {
            display: flex;
            opacity: 1;
        }
        .lightbox-content {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        @media (min-width: 768px) {
            .lightbox-content { flex-direction: row; }
        }
        .lightbox-img-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .lightbox-img-container img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
        .lightbox-sidebar {
            width: 100%;
            background: #fdfbf9;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 3rem;
        }
        @media (min-width: 768px) {
            .lightbox-sidebar { width: 400px; border-left: 1px solid rgba(197, 168, 128, 0.2); }
        }
        .lightbox-close {
            position: absolute;
            top: 2rem;
            right: 2rem;
            color: #2c3539;
            cursor: pointer;
            z-index: 101;
            transition: transform 0.3s;
        }
        .lightbox-close:hover { transform: scale(1.1); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e5e5; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #c5a880; }
        
        .loader {
            border: 3px solid #f3f3f3; border-top: 3px solid #c5a880; border-radius: 50%;
            width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24 overflow-x-hidden">

<!-- Nav -->
<nav class="fixed top-0 w-full bg-wedding-ivory/90 backdrop-blur-lg z-50 h-20 flex items-center px-6 transition-all duration-300 border-b border-wedding-gold/20">
    <div class="max-w-7xl w-full mx-auto flex items-center justify-between">
        <a href="index.html" class="text-wedding-charcoal hover:text-wedding-gold transition duration-300 flex items-center gap-2 text-sm font-medium tracking-widest uppercase">
            <i data-feather="arrow-left" class="w-4 h-4"></i> Return
        </a>
        <span class="font-script text-3xl text-wedding-gold hidden sm:block">Memories</span>
        <button id="auth-btn" onclick="toggleAuth()" class="text-wedding-charcoal hover:text-wedding-gold transition duration-300 flex items-center gap-2 text-xs font-bold tracking-widest uppercase">
            <i data-feather="lock" class="w-4 h-4"></i> <span id="auth-text">Admin</span>
        </button>
    </div>
</nav>

<!-- Hero Section -->
<header class="pt-40 pb-20 px-6 text-center max-w-4xl mx-auto" data-aos="fade-up" data-aos-duration="1200">
    <h2 class="font-script text-5xl md:text-7xl text-wedding-gold mb-4">Our Wedding Journey</h2>
    <h1 class="font-playfair text-3xl md:text-5xl tracking-widest uppercase text-wedding-charcoal mb-6">A Collection of Memories</h1>
    <div class="w-16 h-[1px] bg-wedding-gold mx-auto mb-6"></div>
    <p class="text-slate-500 font-light tracking-wide max-w-xl mx-auto leading-relaxed">Moments of love, joy, and forever. Sharing our most beautiful memories with the people we cherish.</p>
</header>

<!-- Main Feed -->
<main class="px-6 max-w-7xl mx-auto">
    
    <!-- Upload Section -->
    <div id="upload-section" class="hidden bg-white border border-wedding-gold/20 rounded-sm p-8 md:p-10 max-w-2xl mx-auto mb-20 shadow-[0_15px_40px_-15px_rgba(197,168,128,0.15)]" data-aos="fade-up" data-aos-delay="200">
        <div class="text-center mb-8">
            <h3 class="font-playfair text-xl uppercase tracking-widest text-wedding-charcoal mb-2">Add a Memory</h3>
            <p class="text-xs text-slate-400 tracking-widest uppercase">Share a special moment globally</p>
        </div>
        
        <div class="space-y-5">
            <div>
                <input type="text" id="new-post-title" class="w-full bg-transparent border-b border-wedding-gold/30 p-3 text-center text-lg font-playfair outline-none focus:border-wedding-gold transition placeholder-slate-300" placeholder="E.g., The Engagement, Haldi Ceremony...">
            </div>
            <div>
                <textarea id="new-post-content" rows="2" class="w-full bg-transparent border-b border-wedding-gold/30 p-3 text-center text-sm outline-none focus:border-wedding-gold transition resize-none placeholder-slate-300 font-light" placeholder="Write a beautiful description..."></textarea>
            </div>
            
            <div id="image-preview-container" class="hidden relative w-full overflow-hidden flex items-center justify-center pt-4">
                <img id="image-preview" class="w-full h-auto object-cover max-h-80 shadow-md">
                <button onclick="removeImage()" class="absolute top-6 right-2 p-2 bg-white/80 backdrop-blur rounded-full text-wedding-charcoal hover:bg-white transition shadow-sm"><i data-feather="x" class="w-4 h-4"></i></button>
            </div>
            
            <div class="flex flex-col sm:flex-row justify-center items-center gap-4 pt-4">
                <label for="new-post-image" class="cursor-pointer text-wedding-charcoal bg-wedding-champagne hover:bg-wedding-gold/20 transition-colors flex items-center gap-2 px-8 py-3 text-xs tracking-widest uppercase font-medium w-full sm:w-auto justify-center">
                    <i data-feather="image" class="w-4 h-4"></i> Choose Photo
                </label>
                <input type="file" id="new-post-image" accept="image/*" class="hidden" onchange="previewImage(event)">
                <button id="submit-btn" onclick="createNewPost()" class="bg-wedding-charcoal text-white hover:bg-black transition-colors px-10 py-3 text-xs tracking-widest uppercase font-medium w-full sm:w-auto justify-center shadow-lg flex items-center gap-2">Save Memory</button>
            </div>
        </div>
    </div>

    <!-- Gallery Masonry -->
    <div id="gallery-masonry" class="masonry-layout">
        <!-- Loader while fetching -->
        <div class="col-span-1 md:col-span-2 lg:col-span-3 text-center py-20 text-wedding-gold" id="gallery-loader">
            <div class="loader mb-4"></div>
            <p class="font-script text-2xl">Gathering memories...</p>
        </div>
    </div>

    <div class="text-center mt-20" data-aos="fade-in">
        <i data-feather="heart" class="w-6 h-6 text-wedding-gold mx-auto mb-4"></i>
        <p class="font-script text-2xl text-slate-400">Forever & Always</p>
    </div>

</main>

<!-- Lightbox Modal -->
<div id="lightbox" class="lightbox" onclick="if(event.target === this) closeLightbox()">
    <div class="lightbox-close" onclick="closeLightbox()"><i data-feather="x" class="w-8 h-8"></i></div>
    <div class="lightbox-content" onclick="event.stopPropagation()">
        <!-- Left: Image -->
        <div class="lightbox-img-container">
            <img id="lb-image" src="" alt="Wedding Memory">
            <div id="lb-text-placeholder" class="hidden px-8 py-12 text-center text-white text-xl font-medium w-full h-full flex items-center justify-center bg-wedding-charcoal/5"></div>
        </div>
        <!-- Right: Info -->
        <div class="lightbox-sidebar">
            <div class="text-center">
                <i data-feather="camera" class="w-5 h-5 text-wedding-gold mx-auto mb-6"></i>
                <h3 id="lb-title" class="font-playfair italic text-2xl md:text-3xl text-wedding-charcoal mb-4"></h3>
                <div class="w-10 h-[1px] bg-wedding-gold mx-auto mb-6"></div>
                <div id="lb-caption" class="text-sm text-slate-500 leading-loose font-light tracking-wide px-4"></div>
                <div id="lb-date" class="text-[10px] text-wedding-gold uppercase tracking-widest mt-8 font-medium"></div>
            </div>
        </div>
    </div>
</div>

<!-- AOS JS -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<!-- Firebase Module Script -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
    import { getStorage, ref, uploadString, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-storage.js";

    // Firebase configuration from user
    const firebaseConfig = {
        apiKey: "AIzaSyA-De1RC9dO5k0AUqzfhJFg9xGLRpldm9M",
        authDomain: "wedding-galary.firebaseapp.com",
        projectId: "wedding-galary",
        storageBucket: "wedding-galary.firebasestorage.app",
        messagingSenderId: "671325483219",
        appId: "1:671325483219:web:13be561bb9de587bb96426",
        measurementId: "G-4S286FR5JC"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // Global Variables
    const ADMIN_PASS = '127564';
    let customPosts = [];
    let currentLightboxPostId = null;
    let selectedImageBase64 = null;

    // Default post (fallback)
    const defaultPost = {
        id: 'default-post',
        title: 'OUR ENGAGEMENT',
        text: 'The beginning of forever. Surrounded by love and light as we took our first step together.',
        image: 'https://images.unsplash.com/photo-1511285560929-80b456fea0bc?q=80&w=2069&auto=format&fit=crop', 
        date: new Date().toISOString()
    };

    document.addEventListener("DOMContentLoaded", () => {
        feather.replace();
        AOS.init({ duration: 1200, once: true, offset: 50, easing: 'ease-out-cubic' });
        checkAuth();
        fetchAndRenderGallery();
    });

    // --- Authentication ---
    window.toggleAuth = function() {
        const isAdmin = sessionStorage.getItem('wedding_admin') === 'true';
        if(isAdmin) {
            sessionStorage.removeItem('wedding_admin');
            checkAuth();
        } else {
            const pass = prompt('Enter Admin Passcode:');
            if(pass === ADMIN_PASS) {
                sessionStorage.setItem('wedding_admin', 'true');
                checkAuth();
            } else if(pass !== null) {
                alert('Incorrect passcode.');
            }
        }
    }

    function checkAuth() {
        const isAdmin = sessionStorage.getItem('wedding_admin') === 'true';
        const authBtnText = document.getElementById('auth-text');
        const uploadSection = document.getElementById('upload-section');
        const authBtn = document.getElementById('auth-btn');
        
        if(isAdmin) {
            authBtnText.textContent = 'Logout';
            authBtn.innerHTML = '<i data-feather="unlock" class="w-4 h-4"></i> <span id="auth-text">Logout</span>';
            if(uploadSection) uploadSection.classList.remove('hidden');
        } else {
            authBtnText.textContent = 'Admin';
            authBtn.innerHTML = '<i data-feather="lock" class="w-4 h-4"></i> <span id="auth-text">Admin</span>';
            if(uploadSection) uploadSection.classList.add('hidden');
        }
        if(window.feather) feather.replace();
        renderGallery(); 
    }

    // --- Upload UI ---
    window.previewImage = function(event) {
        const file = event.target.files[0];
        if(!file) return;

        // Optional: compress/resize image here before upload to save Firebase bandwidth

        const reader = new FileReader();
        reader.onload = function(e) {
            selectedImageBase64 = e.target.result;
            const container = document.getElementById('image-preview-container');
            const preview = document.getElementById('image-preview');
            preview.src = selectedImageBase64;
            container.classList.remove('hidden');
            if(window.feather) feather.replace();
        };
        reader.readAsDataURL(file);
    }

    window.removeImage = function() {
        selectedImageBase64 = null;
        document.getElementById('new-post-image').value = '';
        const container = document.getElementById('image-preview-container');
        const preview = document.getElementById('image-preview');
        preview.src = '';
        container.classList.add('hidden');
    }

    // --- Firebase Logic ---
    window.createNewPost = async function() {
        const titleInput = document.getElementById('new-post-title');
        const contentInput = document.getElementById('new-post-content');
        const submitBtn = document.getElementById('submit-btn');
        
        const title = titleInput.value.trim() || 'CHERISHED MOMENT';
        const text = contentInput.value.trim();
        
        if (!selectedImageBase64) {
            alert('Please select a photo to add to the gallery.');
            return;
        }

        submitBtn.innerHTML = '<div class="loader !w-4 !h-4 !border-2 !border-t-white mr-2"></div> Uploading...';
        submitBtn.disabled = true;

        try {
            const timestamp = Date.now();
            const storagePath = `images/post_${timestamp}`;
            const imageRef = ref(storage, storagePath);
            
            // Upload Base64 string to Firebase Storage
            await uploadString(imageRef, selectedImageBase64, 'data_url');
            
            // Get the public URL
            const imageUrl = await getDownloadURL(imageRef);
            
            // Save metadata to Firestore
            await addDoc(collection(db, "posts"), {
                title: title,
                text: text,
                image: imageUrl,
                storagePath: storagePath,
                date: new Date().toISOString(),
                timestamp: timestamp
            });

            titleInput.value = '';
            contentInput.value = '';
            removeImage();
            await fetchAndRenderGallery();
            
        } catch(error) {
            console.error("Error creating post:", error);
            alert("Failed to save memory. Check your Firebase Storage/Firestore security rules.");
        } finally {
            submitBtn.innerHTML = 'Save Memory';
            submitBtn.disabled = false;
        }
    }

    async function fetchAndRenderGallery() {
        const masonry = document.getElementById('gallery-masonry');
        try {
            const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            
            customPosts = [];
            querySnapshot.forEach((doc) => {
                customPosts.push({ id: doc.id, ...doc.data() });
            });
            
            renderGallery();
            setTimeout(() => { AOS.refresh(); }, 100);
            
        } catch(error) {
            console.error("Error fetching posts:", error);
            // Check if permission denied due to rules
            if(error.code === 'permission-denied') {
                masonry.innerHTML = '<div class="col-span-1 md:col-span-3 text-center text-red-500 py-10">Database access denied. Please set Firestore rules to allow read.</div>';
            }
        }
    }

    window.deletePost = async function(postId, storagePath, event) {
        event.stopPropagation(); 
        if(confirm('Are you sure you want to permanently delete this memory globally?')) {
            try {
                // Delete from Firestore
                await deleteDoc(doc(db, "posts", postId));
                
                // Delete from Storage if it exists
                if(storagePath) {
                    const imageRef = ref(storage, storagePath);
                    await deleteObject(imageRef);
                }
                
                await fetchAndRenderGallery();
            } catch(error) {
                console.error("Error deleting post:", error);
                alert("Failed to delete memory.");
            }
        }
    }

    // --- Rendering Logic ---
    function renderGallery() {
        const masonry = document.getElementById('gallery-masonry');
        if (!masonry) return;
        
        masonry.innerHTML = '';
        
        // Show default post if DB is empty to keep it looking nice
        const allPosts = customPosts.length > 0 ? customPosts : [defaultPost];
        const isAdmin = sessionStorage.getItem('wedding_admin') === 'true';
        
        allPosts.forEach((post, index) => {
            const div = document.createElement('div');
            div.className = 'gallery-item group';
            const delay = (index % 3) * 150;
            div.setAttribute('data-aos', 'fade-up');
            div.setAttribute('data-aos-delay', delay.toString());
            div.onclick = () => openLightbox(post.id);
            
            const titleDisplay = post.title || 'CHERISHED MOMENT';
            const textDisplay = post.text ? `<p class="text-xs text-slate-500 tracking-wide mt-3 leading-relaxed font-light">${post.text}</p>` : '';
            
            const storagePathAttr = post.storagePath ? post.storagePath : '';
            const deleteBtnHtml = (isAdmin && post.id !== 'default-post') ? 
                `<button onclick="deletePost('${post.id}', '${storagePathAttr}', event)" class="absolute top-4 right-4 bg-white/90 text-red-400 hover:text-red-600 rounded-full p-2.5 z-20 shadow-lg transition-all hover:scale-110 opacity-0 group-hover:opacity-100" title="Delete Photo"><i data-feather="trash-2" class="w-4 h-4"></i></button>` : '';

            if (post.image) {
                div.innerHTML = `
                    <div class="img-container bg-wedding-champagne">
                        ${deleteBtnHtml}
                        <img src="${post.image}" alt="${titleDisplay}" loading="lazy">
                        <div class="img-overlay"></div>
                    </div>
                    <div class="mt-6 text-center px-4">
                        <h3 class="font-playfair text-lg sm:text-xl tracking-widest uppercase text-wedding-charcoal group-hover:text-wedding-gold transition-colors duration-500">${titleDisplay}</h3>
                        ${textDisplay}
                    </div>
                `;
            } else {
                div.innerHTML = `
                    <div class="img-container aspect-[4/3] bg-wedding-champagne flex flex-col items-center justify-center p-8 text-center border border-wedding-gold/20">
                        ${deleteBtnHtml}
                        <i data-feather="heart" class="w-8 h-8 text-wedding-gold/50 mb-4"></i>
                        <span class="font-script text-3xl text-wedding-gold">${titleDisplay}</span>
                    </div>
                    <div class="mt-6 text-center px-4">
                        <h3 class="font-playfair text-lg tracking-widest uppercase text-wedding-charcoal group-hover:text-wedding-gold transition-colors duration-500">${titleDisplay}</h3>
                        ${textDisplay}
                    </div>
                `;
            }
            masonry.appendChild(div);
        });
        
        if(window.feather) feather.replace();
    }

    // --- Lightbox ---
    window.openLightbox = function(postId) {
        currentLightboxPostId = postId;
        const allPosts = customPosts.length > 0 ? customPosts : [defaultPost];
        const post = allPosts.find(p => p.id === postId);
        if(!post) return;
        
        const lbImg = document.getElementById('lb-image');
        const lbTextPlaceholder = document.getElementById('lb-text-placeholder');
        
        if(post.image) {
            lbImg.src = post.image;
            lbImg.classList.remove('hidden');
            lbTextPlaceholder.classList.add('hidden');
        } else {
            lbImg.classList.add('hidden');
            lbTextPlaceholder.innerHTML = `<i data-feather="heart" class="w-12 h-12 text-wedding-gold"></i>`;
            lbTextPlaceholder.classList.remove('hidden');
            if(window.feather) feather.replace();
        }
        
        document.getElementById('lb-title').textContent = post.title || 'Cherished Moment';
        document.getElementById('lb-caption').innerHTML = post.text ? post.text.replace(/\\n/g, '<br>') : '';
        document.getElementById('lb-date').textContent = new Date(post.date).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
        
        document.getElementById('lightbox').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    window.closeLightbox = function() {
        document.getElementById('lightbox').classList.remove('active');
        document.body.style.overflow = '';
        currentLightboxPostId = null;
    }

    document.addEventListener('keydown', (e) => {
        if(e.key === 'Escape' && document.getElementById('lightbox').classList.contains('active')) {
            window.closeLightbox();
        }
    });

</script>
</body>
</html>
