<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Test Runner</title>
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
            background: #0a0f1c;
            color: #e2e8f0;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-container {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 2rem;
            backdrop-filter: blur(12px);
        }
        .test-header {
            color: #06b6d4;
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .test-button {
            background: linear-gradient(135deg, #2563eb, #06b6d4);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 2rem;
        }
        .test-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(6, 182, 212, 0.3);
        }
        .test-results {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
        .status {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            font-weight: bold;
        }
        .status.pass {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .status.fail {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .loading {
            color: #f59e0b;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="test-header">🧪 Portfolio Website Test Suite</div>
        
        <button class="test-button" onclick="runTests()">
            Run All Tests
        </button>
        
        <div id="test-output" class="test-results"></div>
        <div id="test-status" class="status"></div>
    </div>

    <script src="test.js"></script>
    <script>
        async function runTests() {
            const output = document.getElementById('test-output');
            const status = document.getElementById('test-status');
            
            output.innerHTML = '<div class="loading">🔄 Running tests...</div>';
            status.className = 'status loading';
            status.textContent = 'Tests in progress...';
            
            // Capture console output
            const originalLog = console.log;
            let logs = [];
            
            console.log = function(...args) {
                logs.push(args.join(' '));
                originalLog.apply(console, args);
            };
            
            try {
                await portfolioTests.run();
                
                // Display results
                output.textContent = logs.join('\n');
                
                if (portfolioTests.failed === 0) {
                    status.className = 'status pass';
                    status.textContent = `🎉 All ${portfolioTests.passed} tests passed!`;
                } else {
                    status.className = 'status fail';
                    status.textContent = `⚠️ ${portfolioTests.passed} passed, ${portfolioTests.failed} failed`;
                }
            } catch (error) {
                output.textContent = `Error running tests: ${error.message}`;
                status.className = 'status fail';
                status.textContent = '❌ Test execution failed';
            } finally {
                // Restore original console.log
                console.log = originalLog;
            }
        }
        
        // Auto-run tests when page loads (optional)
        // window.addEventListener('load', runTests);
    </script>
</body>
</html>
