<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        if (localStorage.getItem('hub_auth') !== 'true') {
            window.location.href = 'index.html';
        }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ASYNCRIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        .active-tab {
            background: rgba(6, 182, 212, 0.1) !important;
            color: var(--accent-primary) !important;
            border-left: 4px solid var(--accent-primary);
        }
        .sidebar-link {
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 1.25rem;
            width: 100%;
            text-align: left;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.85rem;
        }
        .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.03);
            color: white;
        }
        #mobile-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 40;
        }
        #mobile-overlay.active {
            display: block;
        }
    </style>
</head>
<body class="flex min-h-screen">
    <div id="mobile-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar flex flex-col overflow-hidden">
        <div class="px-6 py-8 border-b border-white/5 relative">
            <div class="flex items-center gap-3 relative z-10">
                <div class="w-10 h-10 bg-gradient-to-tr from-accent-primary/20 to-accent-secondary/20 rounded-xl flex items-center justify-center border border-white/10 text-accent-primary shadow-inner">
                    <i data-feather="command" class="w-6 h-6"></i>
                </div>
                <div>
                    <span class="block font-bold text-white tracking-widest text-lg font-mono">ASYNCRIX</span>
                    <span class="block text-[8px] text-accent-primary font-bold uppercase tracking-[0.2em] mt-0.5">Global Systems</span>
                </div>
            </div>
            <!-- Decorative circle -->
            <div class="absolute -top-10 -left-10 w-32 h-32 bg-accent-primary/5 blur-2xl rounded-full"></div>
        </div>
        
        <nav class="flex-1 py-8 overflow-y-auto custom-scrollbar px-3 space-y-1">
            <!-- General Section -->
            <div class="px-5 py-2 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold mb-2">Core Hub</div>
            <button onclick="switchView('dashboard')" class="sidebar-link active-tab" id="tab-dashboard">
                <i data-feather="activity" class="w-4 h-4"></i> Overview
            </button>
            <button onclick="switchView('items')" class="sidebar-link" id="tab-items">
                <i data-feather="layers" class="w-4 h-4"></i> Inventory
            </button>
            <button onclick="switchView('banking')" class="sidebar-link" id="tab-banking">
                <i data-feather="credit-card" class="w-4 h-4"></i> Treasury
            </button>
            
            <!-- Revenue Section -->
            <div class="px-5 py-4 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold mb-2">Revenue</div>
            <button onclick="switchView('customers')" class="sidebar-link" id="tab-customers">
                <i data-feather="users" class="w-4 h-4"></i> Clients
            </button>
            <button onclick="switchView('invoices')" class="sidebar-link" id="tab-invoices">
                <i data-feather="file-text" class="w-4 h-4"></i> Invoices
            </button>
            <button onclick="switchView('payments-received')" class="sidebar-link" id="tab-payments-received">
                <i data-feather="arrow-down-circle" class="w-4 h-4"></i> Collections
            </button>
            
            <!-- Outgoing Section -->
            <div class="px-5 py-4 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold mb-2">Purchases</div>
            <button onclick="switchView('vendors')" class="sidebar-link" id="tab-vendors">
                <i data-feather="briefcase" class="w-4 h-4"></i> Partners
            </button>
            <button onclick="switchView('bills')" class="sidebar-link" id="tab-bills">
                <i data-feather="file-minus" class="w-4 h-4"></i> Bills
            </button>
            <button onclick="switchView('expenses')" class="sidebar-link" id="tab-expenses">
                <i data-feather="pie-chart" class="w-4 h-4"></i> Expenses
            </button>
        </nav>

        <div class="p-4 logout-btn-wrapper">
            <button onclick="logout()" class="flex items-center gap-3 text-slate-500 hover:text-red-400 transition-all w-full font-bold px-4 py-3 rounded-xl hover:bg-red-400/5 group">
                <i data-feather="power" class="w-4 h-4 group-hover:rotate-12 transition-transform"></i> 
                <span class="text-xs uppercase tracking-widest">Terminate Session</span>
            </button>
            <button onclick="systemReset()" class="flex items-center gap-3 text-slate-600 hover:text-red-500 transition-all w-full font-bold px-4 py-2 mt-2 rounded-xl hover:bg-red-500/5 group">
                <i data-feather="trash-2" class="w-3 h-3"></i> 
                <span class="text-[9px] uppercase tracking-widest">Wipe Data</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="main-wrapper">
        <!-- Dashboard Header -->
        <header class="h-20 border-b border-white/5 bg-navy-800/40 backdrop-blur-xl px-4 md:px-10 flex items-center justify-between sticky top-0 z-30">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 -ml-2 text-white glass-panel bg-white/5 !rounded-lg border-white/10">
                    <i data-feather="menu" class="w-5 h-5"></i>
                </button>
                <h2 id="view-title" class="text-xl md:text-2xl font-bold text-white tracking-tight">System Overview</h2>
            </div>

            <div class="flex items-center gap-4 md:gap-8">
                <!-- Status Badge -->
                <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-400/10 border border-emerald-400/20">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                    <span class="text-[9px] font-bold text-emerald-400 uppercase tracking-widest">Network Live</span>
                </div>

                <div class="flex items-center gap-4 pl-4 md:pl-8 border-l border-white/5">
                    <div class="hidden md:block text-right">
                        <div class="text-sm font-bold text-white tracking-wide">ADMINISTRATOR</div>
                        <div class="text-[9px] text-accent-primary font-bold uppercase tracking-widest mt-0.5">Full System Access</div>
                    </div>
                    <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-accent-primary/20 to-accent-secondary/20 border border-white/10 flex items-center justify-center text-accent-primary shadow-lg">
                        <i data-feather="shield" class="w-5 h-5"></i>
                    </div>
                </div>
            </div>
        </header>

        <!-- Responsive Content Area -->
        <div id="content-viewport" class="flex-1 p-4 md:p-8 overflow-y-auto">
            <!-- Content injected by script.js -->
        </div>
    </div>

    <!-- Modal for Document Form -->
    <div id="form-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-navy-900/90 backdrop-blur-md hidden opacity-0 transition-opacity duration-300 p-4">
        <div class="glass-panel w-full max-w-5xl max-h-[95vh] overflow-hidden flex flex-col shadow-2xl animate-up">
            <div class="p-5 md:p-6 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                <h3 id="modal-title" class="text-lg md:text-xl font-bold text-white">New Document</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white transition-colors p-2">
                    <i data-feather="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div class="p-4 md:p-8 overflow-y-auto flex-1" id="modal-form-container">
                <!-- Form injected here -->
            </div>
            <div class="p-5 md:p-6 border-t border-white/5 bg-white/[0.02] flex flex-col md:flex-row justify-end gap-3">
                <button onclick="closeModal()" class="px-6 py-2.5 text-slate-400 font-bold hover:text-white transition-colors">Cancel</button>
                <button id="save-btn" class="btn-primary justify-center">Save & Continue</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <!-- Notifications -->
    <div id="toast-container"></div>
</body>
</html>
