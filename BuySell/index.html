<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASYNCRIX | Financial Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-6">
    <div class="login-bg">
        <div class="login-glow" style="top: -10%; left: -10%; background: var(--accent-primary);"></div>
        <div class="login-glow" style="bottom: -10%; right: -10%; background: var(--accent-secondary);"></div>
    </div>

    <div class="glass-panel w-full max-w-md p-8 animate-up shadow-2xl relative overflow-hidden">
        <!-- Subtle internal glow -->
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-accent-primary/5 blur-3xl rounded-full"></div>
        
        <div class="text-center mb-10 relative z-10">
            <div class="w-20 h-20 bg-gradient-to-br from-accent-primary/20 to-accent-secondary/20 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-slate-200 text-accent-primary shadow-inner">
                <i data-feather="shield" class="w-10 h-10"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight mb-2">ASYNCRIX</h1>
            <p class="text-transparent bg-clip-text bg-gradient-to-r from-accent-primary to-accent-secondary text-[10px] font-extrabold uppercase tracking-[0.3em]">Make It Simple</p>
        </div>

        <form id="login-form" class="space-y-6 relative z-10">
            <div class="group">
                <label class="block text-[10px] uppercase tracking-widest font-bold text-slate-500 mb-2 px-1">Identity</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-accent-primary transition-colors">
                        <i data-feather="user" class="w-4 h-4"></i>
                    </span>
                    <input type="text" id="username" class="form-input pl-12" placeholder="Username" required>
                </div>
            </div>
            <div class="group">
                <label class="block text-[10px] uppercase tracking-widest font-bold text-slate-500 mb-2 px-1">Access Key</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-accent-primary transition-colors">
                        <i data-feather="key" class="w-4 h-4"></i>
                    </span>
                    <input type="password" id="password" class="form-input pl-12" placeholder="Password" required>
                </div>
            </div>

            <div id="login-error" class="text-red-400 text-xs hidden text-center font-bold px-2 py-1 bg-red-400/5 rounded-lg border border-red-400/10">Permission Denied. Use admin credentials.</div>

            <button type="submit" class="btn-primary w-full py-3 justify-center gap-3">
                <span class="tracking-wide text-sm">AUTHENTICATE</span>
                <i data-feather="chevron-right" class="w-4 h-4"></i>
            </button>
        </form>

        <div class="mt-10 pt-6 border-t border-slate-200 text-center relative z-10">
            <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest">
                Protected by <span class="text-accent-primary">Asyncrix Security protocols</span>
            </p>
            <p class="text-slate-600 text-[10px] mt-2">
                Standard Access: admin / admin
            </p>
        </div>
    </div>

    <script type="module">
        import { loadFromCloud, initDatabase } from './js/database.js';
        
        await initDatabase();
        feather.replace();
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const uInput = document.getElementById('username').value;
            const pInput = document.getElementById('password').value;
            
            try {
                // 1. Try Cloud Authentication
                const users = await loadFromCloud('users');
                const user = users.find(usr => {
                    const dbUser = String(usr.username || '').trim().toLowerCase();
                    const dbPass = String(usr.password || '').trim();
                    const inputUser = String(uInput || '').trim().toLowerCase();
                    const inputPass = String(pInput || '').trim();
                    return dbUser === inputUser && dbPass === inputPass;
                });
                
                if (user) {
                    if (user.status !== 'Active') {
                        alert('Account restricted. Contact administrator.');
                        return;
                    }
                    localStorage.setItem('hub_auth', 'true');
                    localStorage.setItem('hub_user_role', user.role);
                    window.location.href = 'dashboard.html';
                    return;
                }

                // Precise error check
                const userExists = users.some(usr => String(usr.username || '').trim().toLowerCase() === String(uInput || '').trim().toLowerCase());
                const errorDiv = document.getElementById('login-error');
                if (userExists) {
                    errorDiv.textContent = "Invalid Access Key. Please check your password.";
                } else {
                    errorDiv.textContent = "Identity not found. System access denied.";
                }
                errorDiv.classList.remove('hidden');
            } catch (err) {
                console.error('Authentication error:', err);
                document.getElementById('login-error').textContent = "System connection failure. Please try again later.";
                document.getElementById('login-error').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
