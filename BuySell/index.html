<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASYNCRIX | Financial Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-6 bg-navy-900">
    <div class="glass-panel w-full max-w-md p-6 md:p-8 animate-up shadow-2xl">
        <div class="text-center mb-6 md:mb-8">
            <div class="w-16 h-16 bg-accent-primary/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-accent-primary/20 text-accent-primary">
                <i data-feather="lock" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">ASYNCRIX ACCESS</h1>
            <p class="text-transparent bg-clip-text bg-gradient-to-r from-accent-primary to-accent-secondary text-[10px] font-extrabold uppercase tracking-[0.2em] mt-2">Make It Simple</p>
        </div>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="label-title">Username</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">
                        <i data-feather="user" class="w-4 h-4"></i>
                    </span>
                    <input type="text" id="username" class="form-input pl-11" placeholder="admin" required>
                </div>
            </div>
            <div>
                <label class="label-title">Password</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">
                        <i data-feather="lock" class="w-4 h-4"></i>
                    </span>
                    <input type="password" id="password" class="form-input pl-11" placeholder="••••••••" required>
                </div>
            </div>

            <div id="login-error" class="text-red-400 text-xs hidden">Invalid credentials. Try admin/admin.</div>

            <button type="submit" class="btn-primary w-full flex items-center justify-center gap-2">
                Sign In <i data-feather="arrow-right" class="w-4 h-4"></i>
            </button>
        </form>

        <p class="text-center text-slate-500 text-xs mt-8">
            Default credentials: <span class="text-accent-cyan">admin / admin</span>
        </p>
    </div>

    <script type="module" src="script.js"></script>
    <script type="module">
        import { initDatabase } from './database.js';
        
        // Initialize DB handled by script.js

        feather.replace();
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            try {
                const response = await fetch('key.txt');
                const adminPass = (await response.text()).trim();
                
                if (u === 'admin' && p === adminPass) {
                    localStorage.setItem('hub_auth', 'true');
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('login-error').classList.remove('hidden');
                }
            } catch (err) {
                console.error('Failed to load key:', err);
                alert('Authentication system error. Please check server.');
            }
        });
    </script>
</body>
</html>
