<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Sales & Purchase Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        .active-tab {
            background: rgba(6, 182, 212, 0.1);
            color: var(--accent-cyan);
            border-left: 4px solid var(--accent-cyan);
        }
        .sidebar-link {
            transition: all 0.2s;
        }
        .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-navy-900 min-h-screen flex overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 border-r border-white/5 bg-navy-800 flex flex-col z-30">
        <div class="p-6 border-b border-white/5 flex items-center gap-3">
            <div class="w-10 h-10 bg-accent-cyan/10 rounded-xl flex items-center justify-center border border-accent-cyan/20 text-accent-cyan">
                <i data-feather="briefcase" class="w-6 h-6"></i>
            </div>
            <span class="font-bold text-white tracking-tight">Hub v1.0</span>
        </div>
        
        <nav class="flex-1 py-6 space-y-1">
            <button onclick="switchView('dashboard')" class="sidebar-link w-full flex items-center gap-3 px-6 py-3 text-slate-400 font-semibold" id="tab-dashboard">
                <i data-feather="home" class="w-4 h-4"></i> Dashboard
            </button>
            <div class="px-6 py-4 text-[10px] uppercase tracking-widest text-slate-600 font-bold">Sales</div>
            <button onclick="switchView('quotes')" class="sidebar-link w-full flex items-center gap-3 px-6 py-3 text-slate-400 font-semibold" id="tab-quotes">
                <i data-feather="file-text" class="w-4 h-4"></i> Quotations
            </button>
            <button onclick="switchView('sales-orders')" class="sidebar-link w-full flex items-center gap-3 px-6 py-3 text-slate-400 font-semibold" id="tab-sales-orders">
                <i data-feather="shopping-cart" class="w-4 h-4"></i> Sales Orders
            </button>
            <button onclick="switchView('delivery-chalans')" class="sidebar-link w-full flex items-center gap-3 px-6 py-3 text-slate-400 font-semibold" id="tab-delivery-chalans">
                <i data-feather="truck" class="w-4 h-4"></i> Delivery Chalans
            </button>
            <div class="px-6 py-4 text-[10px] uppercase tracking-widest text-slate-600 font-bold">Purchase</div>
            <button onclick="switchView('purchase-orders')" class="sidebar-link w-full flex items-center gap-3 px-6 py-3 text-slate-400 font-semibold" id="tab-purchase-orders">
                <i data-feather="package" class="w-4 h-4"></i> Purchase Orders
            </button>
        </nav>

        <div class="p-6 border-t border-white/5">
            <button onclick="logout()" class="flex items-center gap-3 text-slate-500 hover:text-white transition-colors w-full font-semibold px-2">
                <i data-feather="log-out" class="w-4 h-4"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Top Bar -->
        <header class="h-16 border-b border-white/5 bg-navy-800/50 backdrop-blur-md px-8 flex items-center justify-between">
            <h2 id="view-title" class="text-xl font-bold text-white">Dashboard Overview</h2>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <div class="text-xs font-bold text-white">Admin User</div>
                    <div class="text-[10px] text-accent-cyan">Hub Administrator</div>
                </div>
                <div class="w-8 h-8 rounded-full bg-accent-blue/20 border border-accent-blue/30 flex items-center justify-center text-accent-blue">
                    <i data-feather="user" class="w-4 h-4"></i>
                </div>
            </div>
        </header>

        <!-- Content Area -->
        <div id="content-viewport" class="flex-1 overflow-y-auto p-8 relative">
            <!-- App views will be injected here -->
        </div>
    </main>

    <!-- Modal for Document Form -->
    <div id="form-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-navy-900/80 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="glass-card w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl animate-fade">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
                <h3 id="modal-title" class="text-xl font-bold text-white">New Document</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white transition-colors">
                    <i data-feather="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div class="p-8 overflow-y-auto flex-1 bg-navy-800/30" id="modal-form-container">
                <!-- Form will be injected here -->
            </div>
            <div class="p-6 border-t border-white/5 bg-white/5 flex justify-end gap-4">
                <button onclick="closeModal()" class="px-6 py-2 text-slate-400 font-bold hover:text-white transition-colors">Cancel</button>
                <button id="save-btn" class="btn-primary">Save Document</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Check Auth
        if (localStorage.getItem('hub_auth') !== 'true') {
            window.location.href = 'index.html';
        }
        feather.replace();
    </script>
</body>
</html>
